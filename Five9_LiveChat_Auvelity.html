<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <link id="icon" rel="icon" href="" />
    <meta name="author" content="Aaron D. Thompson" />
    <meta name="description" content="Five9 LiveChat Client" />
    <meta name="keywords" content="Five9, LiveChat, Chat, Client, JavaScript, Plugin, Contact Center, Example, CSS" />
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#000000" />
    <title id="title">Auvelity OnMySide</title>

    <style>
        body {
            background-color: whitesmoke;
            color: black;
        }

        .dark-mode {
            background-color: black;
            color: white;
        }
    </style>
</head>
<body>
<noscript>You need to enable JavaScript to run this app.</noscript>

<script src="https://ajax.googleapis.com/ajax/libs/jquery/1.7.1/jquery.min.js" type="text/javascript"></script>
<script src="https://live-chat.ps.five9.com/Five9ChatPlugin.js" type="text/javascript"></script>

<main role="main" >
  <h1 id="pageTitle" style="text-align: center">Auvelity Live Chat Example</h1>
</main>

<script>
  function toggleDarkMode() {
    let element = document.body;
    element.classList.toggle('dark-mode');
  }

  async function intiFive9Chat(options) {
    await Five9ChatPlugin(options);
    //document.getElementById("icon").href = Five9ChatGetOption('icon');
    //document.getElementById("title").innerHTML = Five9ChatGetOption('title') || '';
    //document.getElementById("pageTitle").innerHTML = Five9ChatGetOption('title') || '';
  }

  $(document).ready(function () {
    //let options = Five9ChatGetParameters(location.search);
    // TODO: Remove the above line and replace with your options from the Designer below.
     //let options = {
    //   "appId": "Your App ID",
    //   "configId": "Your Config ID",
    //   "region": "USA"
    // };
    const queryString = window.location.search;
	  const urlParams = new URLSearchParams(queryString);
	  const topic = urlParams.get('topic');

    let options = {
      "appId": "Occam Health",
      "description": "Auvelity OnMySide",
      "domain": "Occam Health",
      "campaignName": "Chat_Auvelity",
      "addCustomerName": true,
      "subtitle": "Auvelity Live Chat™",
      "chatStartImage": "https://occamhealth.github.io/Five9ChatTest/AuvelityOMS.png",
      "errorImage": "https://occamhealth.github.io/Five9ChatTest/AuvelityOMS.png",
      "waitingImage": "https://live-chat.ps.five9.com/waiting-blue.gif",
      "showEndButton": true,
      "minimizeOnEnd": true,
      "showButtons": true,
      "btnEmailImageSelected": "",
      "emailTranscriptText": "",
      "launcherOpenText": "Chat",
      "titleBackgroundColor": "#51057a",
      "customerTextColor": "#f3fb7e",
      "customerBubbleColor": "#51057a",
      "buttonBackgroundColor": "#51057a",
      "miniSubmitColor": "#51057a",
      "miniForm": true,
      "formMessage": "Please complete this form to start your chat session",
      "attributes": [
          {
            "topic": topic
          }
        ],
      "formData": [
        {
          "label": "Your Name",
          "cav": "contact.name",
          "formType": "both",
          "type": "text",
          "required": false
        },
        {
          "label": "Email",
          "cav": "contact.email",
          "formType": "both",
          "type": "email",
          "required": false 
        },
        {
          "label": "Question",
          "cav": "Question",
          "formType": "both",
          "type": "textarea",
          "required": true
        }
      ],
      "clearForm": true,
      "markRequiredFields": true,
      "blockRestart": true,
      "addCloseChat": true,
      "minimizeText": "Minimize Chat",
      "alwaysShowMinimize": true,
      "enableDisclaimer": true,
      "requireDisclaimer": true,
      "markDisclaimerRequired": true,
      "centerDisclaimer": true,
      "disclaimer": "By proceeding I confirm that I am 18 years of age or older. I agree and acknowledge that my personal information (which may include health information) will be processed as part of the Axsome OnMySide service. </br> <a href='https://www.axsome.com/terms-of-use' target='_blank'>Axsome Terms of Use</a></br> <a href='https://www.axsome.com/privacy-notice' target='_blank'>Axsome Privacy Notice</a>",
      "disclaimerVar": "Consent",
      "timezone": "America/New_York",
      "useBusinessHours": true,
      "noAgentsMessage": "Thank you for contacting Axsome OnMySide. Our Support Navigators are available Monday through Friday, 8:00 AM to 8:00 PM ET. A Support Navigator will be happy to assist you during our normal business hours.",
      "fontSizeForm": "18",
      "fontSizeFormInput": "18",
      "miniSubmitColorCompleted": "#307104",
      "miniSubmitBackgroundColorCompleted": "#ffffff",
      "fontChatInput": "Averta-Regular",
      "fontSizeChatInput": "14",
      "fontSizeTitle": "18",
      "auth": "5044dcf3-4fcc-46e6-a465-a689f7b04ac8"
    }

    if (options.darkMode) {
      toggleDarkMode();
    } else {
      if (options.standAloneBackgroundColor) {
        document.body.style.backgroundColor = options.standAloneBackgroundColor;
      }
      if (options.standAloneColor) {
        document.body.style.color = options.standAloneColor;
      }
    }
    intiFive9Chat(options);
  });
</script>

</body>
</html>
